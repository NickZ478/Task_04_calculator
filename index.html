<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>Калькулятор</h1>
        
        <div class="inputs">
            <input type="text" id="num1" placeholder="Введите первое число">
            <input type="text" id="num2" placeholder="Введите второе число">
        </div>

        <div class="buttons">
            <button class="btn-sum" id="btnSum">Сумма</button>
            <button class="btn-diff" id="btnDiff">Разность</button>
            <button class="btn-mult" id="btnMult">Произведение</button>
            <button class="btn-div" id="btnDiv">Деление</button>
        </div>

        <div class="result-box">
            <div class="result-label">Результат:</div>
            <div class="result-value" id="result">0</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
